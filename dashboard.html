<!DOCTYPE html>
<html>
<head>
    <title>Live Automation Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0a; 
            color: #00ff41; 
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        h1 { text-align: center; margin-bottom: 20px; text-shadow: 0 0 10px #00ff41; }
        .container { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .left-panel { flex: 2; }
        .right-panel { flex: 1; }
        #live-cam { 
            width: 100%; 
            height: 600px; 
            border: 3px solid #00ff41; 
            background: #111;
            box-shadow: 0 0 20px rgba(0,255,65,0.3);
        }
        .panel { 
            background: #151515; 
            border: 1px solid #333; 
            padding: 15px; 
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .panel h3 { color: #fff; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        button {
            width: 100%;
            padding: 20px;
            font-size: 18px;
            background: #00ff41;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
            border-radius: 4px;
            transition: all 0.3s;
        }
        button:hover { background: #00cc33; box-shadow: 0 0 15px #00ff41; }
        #log { 
            height: 250px; 
            overflow-y: scroll; 
            background: #0d0d0d; 
            padding: 10px; 
            border: 1px solid #333;
            font-size: 12px;
        }
        .log-entry { margin: 3px 0; padding: 2px 0; border-bottom: 1px solid #1a1a1a; }
        .log-info { color: #00ff41; }
        .log-warn { color: #ffaa00; }
        .log-error { color: #ff4444; }
        .cred-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 13px; }
        .cred-label { color: #888; }
        .cred-value { color: #fff; word-break: break-all; }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        .status-active { background: #00ff41; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-box { background: #1a1a1a; padding: 10px; text-align: center; border-radius: 3px; }
        .stat-num { font-size: 24px; color: #00ff41; }
        .stat-label { font-size: 11px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>🔴 LIVE AUTOMATION FEED</h1>
    
    <div class="container">
        <div class="left-panel">
            <div class="panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span><span class="status-indicator" id="cam-status"></span>BROWSER VIEW</span>
                    <span style="color:#888; font-size:12px;">1 FPS STREAM</span>
                </div>
                <img id="live-cam" src="/stream" alt="Live browser feed">
            </div>
        </div>
        
        <div class="right-panel">
            <button onclick="createAccount()">🚀 CREATE ACCOUNT</button>
            
            <div class="panel">
                <h3>📊 SESSION STATS</h3>
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-num" id="stat-attempts">0</div>
                        <div class="stat-label">ATTEMPTS</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-num" id="stat-success">0</div>
                        <div class="stat-label">SUCCESS</div>
                    </div>
                </div>
            </div>
            
            <div class="panel">
                <h3>🔑 LAST CREDENTIALS</h3>
                <div class="cred-row">
                    <span class="cred-label">Email:</span>
                    <span class="cred-value" id="last-email">waiting...</span>
                </div>
                <div class="cred-row">
                    <span class="cred-label">Username:</span>
                    <span class="cred-value" id="last-user">waiting...</span>
                </div>
                <div class="cred-row">
                    <span class="cred-label">Password:</span>
                    <span class="cred-value" id="last-pass">waiting...</span>
                </div>
            </div>
            
            <div class="panel">
                <h3>📜 ACTIVITY LOG</h3>
                <div id="log"></div>
            </div>
        </div>
    </div>

    <script>
        let attempts = 0;
        let successes = 0;
        
        function log(msg, type='info') {
            const div = document.getElementById('log');
            const cls = type === 'warn' ? 'log-warn' : type === 'error' ? 'log-error' : 'log-info';
            div.innerHTML += `<div class="log-entry ${cls}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            div.scrollTop = div.scrollHeight;
        }
        
        async function createAccount() {
            attempts++;
            document.getElementById('stat-attempts').textContent = attempts;
            document.getElementById('cam-status').classList.add('status-active');
            
            log('Initializing Tor circuit...');
            log('Requesting new identity from Tor ControlPort...');
            log('Fetching disposable email from Mail.tm API...');
            log('Launching Playwright with stealth profile...');
            log('Applying humanized behavior patterns...');
            log('Navigating to Instagram signup page...');
            log('Randomizing mouse movements...');
            log('Typing credentials with variable delays...');
            log('Submitting registration form...');
            log('Waiting for server response...');
            
            const res = await fetch('/create', {method: 'POST'});
            const data = await res.json();
            
            log(data.message, 'info');
            log('Monitoring CAPTCHA state via live feed...');
            
            setTimeout(async () => {
                const credRes = await fetch('/credentials');
                const creds = await credRes.json();
                if (creds.username) {
                    successes++;
                    document.getElementById('stat-success').textContent = successes;
                    document.getElementById('last-email').textContent = creds.email;
                    document.getElementById('last-user').textContent = creds.username;
                    document.getElementById('last-pass').textContent = creds.password;
                    log(`Account created: ${creds.username}`, 'info');
                    log('Tor IP rotated for next session', 'warn');
                }
                document.getElementById('cam-status').classList.remove('status-active');
            }, 8000);
        }
        
        log('System ready. Click CREATE ACCOUNT to begin.');
    </script>
</body>
</html>
